<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan - NAMASTORE</title>
    <style>
        :root { 
            --p-color: #ff0000; 
            --card-color: rgba(22, 26, 30, 0.8); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #0b0d0f; background-size: cover; background-position: center;
            background-attachment: fixed; color: #ffffff; max-width: 500px; 
            margin: auto; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- PRELOADER --- */
        #preloader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 999999999; 
            opacity: 1; visibility: visible;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }
        #preloader.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .orbit-container { position: relative; width: 85px; height: 85px; }
        .orbit-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 50%; }
        .orbit-spinner { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: orbit-spin 1.2s linear infinite; }
        .orbit-ball { position: absolute; top: -8px; left: 50%; width: 16px; height: 16px; background-color: #555; border-radius: 50%; transform: translateX(-50%); transition: background-color 0.8s ease, box-shadow 0.8s ease; }
        .loader-text { margin-top: 35px; color: #555; font-size: 11px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; opacity: 0.8; text-align: center; transition: color 0.8s ease; }
        @keyframes orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        .header-fixed { padding: 25px 20px 10px; flex-shrink: 0; z-index: 100; }
        .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .owner-info { display: flex; align-items: center; gap: 12px; }
        .owner-pp { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--p-color); padding: 2px; object-fit: cover; background: #000; }
        .owner-text h2 { font-size: 14px; font-weight: 900; letter-spacing: 1px; color: var(--p-color); }
        .owner-text p { font-size: 9px; color: #8e959e; font-weight: 800; text-transform: uppercase; }

        /* --- HAMBURGER --- */
        #menuToggle { display: none; }
        .hamburger { width: 42px; height: 42px; background: var(--card-color); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; backdrop-filter: blur(10px); }
        .hamburger span { display: block; width: 18px; height: 2px; background: var(--p-color); border-radius: 2px; transition: 0.3s; }
        #menuToggle:checked ~ .hamburger span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
        #menuToggle:checked ~ .hamburger span:nth-child(2) { opacity: 0; }
        #menuToggle:checked ~ .hamburger span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }
        .nav-menu { position: fixed; top: 80px; right: -250px; width: 220px; background: var(--card-color); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; transition: 0.4s; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 1000; }
        #menuToggle:checked ~ .nav-menu { right: 20px; }
        .nav-menu a { display: block; color: #fff; text-decoration: none; padding: 12px; font-size: 12px; font-weight: 800; border-radius: 12px; }

        /* --- STATS CARD (DAILY ONLY) --- */
        .stat-card { background: var(--card-color); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 22px; backdrop-filter: blur(10px); margin-bottom: 15px; }
        .stat-label { font-size: 10px; color: #8e959e; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { font-size: 24px; font-weight: 900; }
        .stat-value span { color: var(--p-color); font-size: 14px; margin-right: 2px; }
        .progress-container { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--p-color); width: 0%; transition: 1s; box-shadow: 0 0 10px var(--p-color); }

        /* --- LIST TITLE FIXED --- */
        .list-header { padding: 0 20px 10px; flex-shrink: 0; }
        .list-title { font-size: 12px; font-weight: 900; color: var(--p-color); text-transform: uppercase; letter-spacing: 1px; }

        /* --- SCROLL AREA (TRANSACTIONS ONLY) --- */
        .scroll-container { flex-grow: 1; overflow-y: auto; padding: 10px 20px 30px; scrollbar-width: none; }
        .scroll-container::-webkit-scrollbar { display: none; }

        .trx-item { background: var(--card-color); border: 1px solid rgba(255,255,255,0.03); padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); }
        .trx-info h4 { font-size: 13px; color: #fff; margin-bottom: 4px; font-weight: 800; }
        .trx-info p { font-size: 10px; color: #555; font-weight: 700; }
        .trx-amount { color: #10b981; font-weight: 900; font-size: 14px; text-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .delete-btn { color: #ff4d4d !important; text-align: center; border: 1px dashed rgba(255, 77, 77, 0.3) !important; margin-top: 10px; font-size: 10px !important; display: block; width: 100%; text-decoration: none; padding: 10px; border-radius: 12px; }
    </style>
</head>
<body>

<div id="preloader">
    <div class="orbit-container">
        <div class="orbit-ring"></div>
        <div class="orbit-spinner"><div class="orbit-ball"></div></div>
    </div>
    <div class="loader-text" id="loaderTextDisplay">LOADING...</div>
</div>

<script>
    const BASE_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/";

    async function initFinance() {
        try {
            const res = await fetch(`${BASE_URL}owner_config.json`);
            const config = await res.json();
            if (config) {
                const primary = config.colors.primary;
                const storeName = config.storeName || "NAMASTORE";
                
                document.documentElement.style.setProperty('--p-color', primary);
                document.documentElement.style.setProperty('--card-color', config.colors.card);
                if(config.bg) document.body.style.backgroundImage = `url(${config.bg})`;
                
                const pp = document.getElementById('owner-pp');
                if(pp && config.pp) pp.src = config.pp;
                document.getElementById('store-name-label').innerText = storeName + "";

                const ball = document.querySelector('.orbit-ball');
                const text = document.getElementById('loaderTextDisplay');
                if(ball) { 
                    ball.style.backgroundColor = primary; 
                    ball.style.boxShadow = `0 0 15px ${primary}, 0 0 30px ${primary}`; 
                }
                if(text) { 
                    text.style.color = primary; 
                    setTimeout(() => { text.innerText = storeName; }, 500);
                }
            }
        } catch (e) { console.log("Config Error"); }
        loadFinance();
    }

    function hideLoader() {
        const loader = document.getElementById('preloader');
        if (loader) loader.classList.add('hide'); 
    }

    async function loadFinance() {
        const safety = setTimeout(hideLoader, 4000); 
        try {
            const res = await fetch(`${BASE_URL}transaksi.json`);
            const data = await res.json();
            const listContainer = document.getElementById('trxList');
            
            if (!data) { 
                listContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#555; font-weight:800;">BELUM ADA TRANSAKSI.</div>'; 
                hideLoader(); return; 
            }

            let totalHarian = 0;
            const sekarang = new Date(); sekarang.setHours(0,0,0,0);

            listContainer.innerHTML = '';
            const keys = Object.keys(data).reverse();

            keys.forEach(id => {
                const trx = data[id];
                const harga = parseInt(trx.harga) || 0;
                const tglFull = trx.tanggal || ""; 
                const p = tglFull.match(/\d+/g); 
                
                if (p && p.length >= 3) {
                    const tglTrx = new Date(parseInt(p[2]), parseInt(p[1]) - 1, parseInt(p[0]));
                    tglTrx.setHours(0,0,0,0);
                    if (tglTrx.getTime() === sekarang.getTime()) totalHarian += harga;
                }

                listContainer.innerHTML += `
                    <div class="trx-item">
                        <div class="trx-info">
                            <h4>${trx.produk}</h4>
                            <p>${tglFull} • ${trx.nama}</p>
                        </div>
                        <div class="trx-amount">+${harga.toLocaleString('id-ID')}</div>
                    </div>`;
            });

            document.getElementById('v-harian').innerHTML = `<span>Rp</span>${totalHarian.toLocaleString('id-ID')}`;

            setTimeout(() => {
                const ph = document.getElementById('p-harian');
                if(ph) ph.style.width = Math.min((totalHarian / 50000) * 100, 100) + '%';
            }, 500);

            clearTimeout(safety);
            setTimeout(hideLoader, 1500);
        } catch (e) { hideLoader(); }
    }

    async function hapusSemuaTransaksi() {
        if (confirm("⚠️ RESET SEMUA DATA KEUANGAN?")) {
            await fetch(`${BASE_URL}transaksi.json`, { method: 'DELETE' });
            location.reload();
        }
    }

    initFinance();
</script>

<div class="header-fixed">
    <div class="top-nav">
        <div class="owner-info">
            <img src="" id="owner-pp" class="owner-pp">
            <div class="owner-text">
                <h2>MASUKAN KEUANGAN</h2>
                <p id="store-name-label">NAMASTORE</p>
            </div>
        </div>
        <div class="menu-wrapper">
            <input type="checkbox" id="menuToggle">
            <label for="menuToggle" class="hamburger"><span></span><span></span><span></span></label>
            <div class="nav-menu">
                <a href="index.html">⚙️ Owner Panel</a>
                <a href="database.html">📊 Database Viewer</a>
                <a href="admin_settings.html">🎨 Customizer</a>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 5px 0;">
                <a href="#" class="delete-btn" onclick="hapusSemuaTransaksi()">🗑️ RESET SEMUA DATA</a>
            </div>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-label">Daily Profit (Target 50k)</div>
        <div class="stat-value" id="v-harian"><span>Rp</span>0</div>
        <div class="progress-container"><div id="p-harian" class="progress-fill"></div></div>
    </div>
</div>

<div class="list-header">
    <h3 class="list-title">Live Transaction History</h3>
</div>

<div class="scroll-container">
    <div id="trxList"><div style="text-align:center; padding:50px; color:#555; font-size:12px; font-weight:800;">FETCHING DATABASE...</div></div>
</div>

</body>
</html>

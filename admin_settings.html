<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Settings Ultra Luxury - NIDALOPSTORE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/nano.min.css"/>
    <style>
        :root { 
            --p-color: #ff0000; 
            --card-color: rgba(10, 11, 14, 0.7); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #020203; 
            background-size: cover; 
            background-position: center;
            background-attachment: fixed; 
            color: #ffffff; 
            max-width: 500px; 
            margin: auto; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            padding: 25px;
            overflow-x: hidden;
            position: relative;
        }

        /* Overlay Noise biar background lebih bertekstur mewah */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.2;
            pointer-events: none;
            z-index: 1;
        }

        /* --- HAMBURGER MENU ANIMATION --- */
        .menu-wrapper { position: fixed; top: 25px; right: 25px; z-index: 10002; }
        #menuToggle { display: none; }
        .hamburger { 
            width: 45px; height: 45px; background: var(--card-color); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; gap: 5px; cursor: pointer; backdrop-filter: blur(10px);
        }
        .hamburger span { display: block; width: 22px; height: 2px; background: var(--p-color); border-radius: 2px; transition: 0.4s; }
        
        #menuToggle:checked + .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        #menuToggle:checked + .hamburger span:nth-child(2) { opacity: 0; }
        #menuToggle:checked + .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-menu { 
            position: fixed; top: 85px; right: -250px; width: 220px; 
            background: var(--card-color); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 15px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10001; 
        }
        #menuToggle:checked ~ .nav-menu { right: 25px; }
        .nav-menu a { display: block; color: #ffffff; text-decoration: none; padding: 12px; font-size: 13px; font-weight: 800; border-radius: 12px; transition: 0.2s; }
        .nav-menu a:hover { background: rgba(255,255,255,0.05); color: var(--p-color); }

        .container-content { position: relative; z-index: 2; }

        /* --- HEADER --- */
        .header { text-align: center; margin-bottom: 40px; padding-top: 20px; }
        .header h2 { 
            color: var(--p-color); 
            font-size: 26px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            filter: drop-shadow(0 0 10px var(--p-color));
        }

        /* --- CARDS --- */
        .setting-card { 
            background: var(--card-color); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 30px; 
            border-radius: 35px; 
            margin-bottom: 25px;
            backdrop-filter: blur(25px) saturate(180%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        .setting-card::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* --- PROFILE --- */
        .pp-preview { 
            width: 130px; height: 130px; 
            border-radius: 50%; 
            border: 2px solid rgba(255,255,255,0.2);
            padding: 5px; 
            object-fit: cover; 
            margin-bottom: 25px; 
            animation: pulse-glow 3s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(var(--p-color), 0.2); border-color: rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 40px var(--p-color); border-color: var(--p-color); }
        }

        .upload-btn { 
            background: rgba(255,255,255,0.05); 
            color: #fff; padding: 14px 25px; 
            border-radius: 18px; font-size: 10px; 
            font-weight: 800; cursor: pointer; 
            border: 1px solid rgba(255,255,255,0.15); 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 25px; }
        .control-item label { font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }

        .pickr .pcr-button { 
            width: 50px !important; height: 50px !important; 
            border-radius: 18px !important; 
            border: 1px solid rgba(255,255,255,0.2) !important;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-main { 
            background: linear-gradient(135deg, var(--p-color) 0%, #4a0000 100%); 
            color: #fff; width: 100%; padding: 22px; 
            border: none; border-radius: 25px; 
            font-weight: 900; cursor: pointer; 
            letter-spacing: 3px; font-size: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }

        .btn-main::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(255,255,255,0.1), transparent);
        }
    </style>
</head>
<body>

<div class="menu-wrapper">
    <input type="checkbox" id="menuToggle">
    <label for="menuToggle" class="hamburger">
        <span></span><span></span><span></span>
    </label>
    <div class="nav-menu">
        <a href="index.html">⚙️ Owner Panel</a>
        <a href="database.html">📊 Database Viewer</a>
        <a href="keuntungan.html">💰 Keuntungan</a>
        <a href="admin_settings.html">🎨 Customizer</a>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 5px 0;">
        <a href="#" onclick="localStorage.clear(); location.reload();">🚪 Logout</a>
        <a href="https://cemastore.vercel.app/" target="_blank">🏠 Ke Toko</a>
    </div>
</div>

<div class="container-content">
    <div class="header">
        <h2>INTERFACE</h2>
        <p>PREMIUM CONFIGURATION</p>
    </div>

    <div class="setting-card">
        <span style="font-size: 10px; color: #555; font-weight: 900; letter-spacing: 2px; display: block; margin-bottom: 20px;">01. VISUAL IDENTITY</span>
        <div style="text-align: center;">
            <img src="https://i.ibb.co/5h9N3Y4/logo-nidalo.png" id="img-pp" class="pp-preview">
            <div style="display: flex; justify-content: center; gap: 15px;">
                <label for="input-pp" class="upload-btn">AVATAR</label>
                <input type="file" id="input-pp" hidden accept="image/*" onchange="previewPP(this)">
                <label for="input-bg" class="upload-btn">WALLPAPER</label>
                <input type="file" id="input-bg" hidden accept="image/*" onchange="previewBG(this)">
            </div>
        </div>
    </div>

    <div class="setting-card">
        <span style="font-size: 10px; color: #555; font-weight: 900; letter-spacing: 2px; display: block; margin-bottom: 20px;">02. ATMOSPHERE</span>
        <div class="control-item"><label>Primary Accent</label><div id="picker-p"></div></div>
        <div class="control-item"><label>Glass Surface</label><div id="picker-card"></div></div>
    </div>

    <button class="btn-main" onclick="saveSettings()">SYNC TO FIREBASE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
<script>
    const DB_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/.json";
    let config = { pp: '', bg: '', colors: { primary: '#ff0000', card: 'rgba(10, 11, 14, 0.7)' } };

    async function init() {
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            if (data && data.owner_config) {
                config = data.owner_config;
                document.getElementById('img-pp').src = config.pp;
                if(config.bg) document.body.style.backgroundImage = `url(${config.bg})`;
                updateUI();
            }
        } catch (e) { console.error(e); }
        setupPickers();
    }

    function setupPickers() {
        createPicker('#picker-p', config.colors.primary, 'primary');
        createPicker('#picker-card', config.colors.card, 'card');
    }

    function createPicker(el, color, key) {
        const p = Pickr.create({
            el: el, theme: 'nano', default: color,
            components: { preview: true, opacity: true, hue: true, interaction: { hex: true, input: true, save: true } }
        });
        p.on('change', (c) => { 
            const val = c.toRGBA().toString(0);
            config.colors[key] = val; 
            updateUI(); 
        });
        p.on('save', () => p.hide());
    }

    function updateUI() {
        document.documentElement.style.setProperty('--p-color', config.colors.primary);
        document.documentElement.style.setProperty('--card-color', config.colors.card);
    }

    function previewPP(i) {
        const r = new FileReader();
        r.onload = (e) => { document.getElementById('img-pp').src = e.target.result; config.pp = e.target.result; };
        r.readAsDataURL(i.files[0]);
    }

    function previewBG(i) {
        const r = new FileReader();
        r.onload = (e) => { document.body.style.backgroundImage = `url(${e.target.result})`; config.bg = e.target.result; };
        r.readAsDataURL(i.files[0]);
    }

    async function saveSettings() {
        const btn = document.querySelector('.btn-main');
        btn.innerText = "UPLOADING..."; btn.disabled = true;
        try {
            await fetch(DB_URL, { method: 'PATCH', body: JSON.stringify({ owner_config: config }) });
            alert("✅ Interface Synced Successfully!");
        } catch (e) { alert("❌ Error!"); }
        btn.innerText = "SYNC TO FIREBASE"; btn.disabled = false;
    }

    init();
</script>
</body>
</html>
